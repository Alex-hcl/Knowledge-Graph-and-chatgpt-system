<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChatGPT & Knowledge Graph Demo</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <link rel="stylesheet" href="../../css/chat-kg-demo.css">
    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts/dist/echarts.min.js"></script>
</head>
<body class="kg-demo-body">
<div class="container" id="kg-demo-root">
    <div class="col-md-6" id="chat-container">
        <h2>Chat</h2>
        <div id="chat"></div>
        <div class="input-group mb-3" id="input-container">
            <input type="text" class="form-control" id="user-input" placeholder="Type your message...">
            <div class="input-group-append">
                <button class="btn btn-primary" id="send-btn" type="button">Send</button>
            </div>
        </div>
    </div>
    <div class="col-md-6" id="knowledge-graph">
        <h2>Knowledge Graph</h2>
        <div id="chart-container"></div>
    </div>
</div>

<script src="../../js/chat-kg-demo.js"></script>
<script>
    initChatKnowledgeGraphDemo({
        selectors: {
            userInput: '#user-input',
            sendButton: '#send-btn',
            chat: '#chat',
            graphPanel: '#knowledge-graph',
            chartContainer: '#chart-container'
        },
        assistantResponse: 'Human information processing involves perception, attention, memory, reasoning, and feedback loops that shape decision-making and learning.',
        graphData: {
            nodes: [
                { name: 'Artificial Intelligence', symbolSize: 50, itemStyle: { color: '#ff7f50' } },
                { name: 'Machine Learning', symbolSize: 40, itemStyle: { color: '#87ceeb' } },
                { name: 'Natural Language Processing', symbolSize: 30, itemStyle: { color: '#98fb98' } },
                { name: 'Knowledge Graph', symbolSize: 35, itemStyle: { color: '#dda0dd' } },
                { name: 'Data Mining', symbolSize: 30, itemStyle: { color: '#ff69b4' } }
            ],
            links: [
                { source: 'Artificial Intelligence', target: 'Machine Learning' },
                { source: 'Artificial Intelligence', target: 'Natural Language Processing' },
                { source: 'Machine Learning', target: 'Knowledge Graph' },
                { source: 'Natural Language Processing', target: 'Knowledge Graph' },
                { source: 'Knowledge Graph', target: 'Data Mining' }
            ]
        },
        repulsion: 100,
        renderImmediately: true,
        nodeClickMode: 'name'
    });
</script>
</body>
</html>
